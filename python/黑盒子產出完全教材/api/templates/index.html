<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑盒子完全教材產出系統</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', 'PingFang TC', 'Noto Sans TC', sans-serif;
            background: #f0f4f8;
            color: #2d3748;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #1a365d, #2b6cb0);
            color: white;
            padding: 24px 40px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
        }

        header h1 { font-size: 1.8rem; font-weight: 700; }
        header p  { font-size: 0.95rem; opacity: 0.85; margin-top: 4px; }

        main {
            max-width: 960px;
            margin: 32px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 28px 32px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .card h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #2b6cb0;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ebf4ff;
        }

        /* ── 四格檔案上傳區 ── */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        @media (max-width: 600px) {
            .file-grid { grid-template-columns: 1fr; }
        }

        .drop-zone {
            border: 2px dashed #90cdf4;
            border-radius: 10px;
            background: #f7faff;
            min-height: 130px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            padding: 16px;
            position: relative;
        }

        .drop-zone:hover,
        .drop-zone.drag-over {
            border-color: #2b6cb0;
            background: #ebf4ff;
        }

        .drop-zone.has-file {
            border-color: #48bb78;
            background: #f0fff4;
        }

        .drop-zone .slot-label {
            font-size: 0.78rem;
            color: #a0aec0;
            position: absolute;
            top: 8px;
            left: 12px;
        }

        .drop-zone .icon {
            font-size: 2.2rem;
            margin-bottom: 8px;
            color: #90cdf4;
        }

        .drop-zone.has-file .icon { color: #48bb78; }

        .drop-zone .hint {
            font-size: 0.82rem;
            color: #718096;
            text-align: center;
            line-height: 1.5;
        }

        .drop-zone .file-info {
            display: none;
            text-align: center;
        }

        .drop-zone.has-file .file-info { display: block; }
        .drop-zone.has-file .hint-default { display: none; }

        .file-info .file-name {
            font-size: 0.88rem;
            font-weight: 600;
            color: #276749;
            word-break: break-all;
            margin-bottom: 4px;
        }

        .file-info .file-size {
            font-size: 0.75rem;
            color: #68d391;
        }

        .remove-btn {
            position: absolute;
            top: 6px;
            right: 8px;
            background: #fed7d7;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 0.75rem;
            cursor: pointer;
            color: #c53030;
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .drop-zone.has-file .remove-btn { display: flex; }

        .remove-btn:hover { background: #fc8181; }

        .supported-types {
            font-size: 0.75rem;
            color: #a0aec0;
            margin-top: 14px;
            text-align: center;
        }

        /* ── 表單設定 ── */
        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 16px;
        }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
        }

        .form-group { display: flex; flex-direction: column; gap: 6px; }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #4a5568;
        }

        input[type="text"], select {
            padding: 10px 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #2d3748;
            background: #fafafa;
            transition: border-color 0.2s;
            width: 100%;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #2b6cb0;
            background: white;
        }

        /* ── 題型勾選 ── */
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f7faff;
            border: 1.5px solid #e2e8f0;
            border-radius: 20px;
            padding: 6px 14px;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
        }

        .checkbox-item input { display: none; }

        .checkbox-item.checked {
            background: #2b6cb0;
            border-color: #2b6cb0;
            color: white;
        }

        .checkbox-item span { font-size: 0.83rem; font-weight: 500; }

        /* ── 按鈕 ── */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2b6cb0, #1a365d);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: 0.5px;
        }

        .submit-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* ── 進度 ── */
        #status-area { display: none; }

        .progress-bar-wrap {
            background: #e2e8f0;
            border-radius: 8px;
            height: 8px;
            overflow: hidden;
            margin: 12px 0;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #2b6cb0, #63b3ed);
            border-radius: 8px;
            transition: width 0.4s ease;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .status-msg {
            font-size: 0.9rem;
            color: #4a5568;
            text-align: center;
        }

        /* ── 結果 ── */
        #result-area { display: none; }

        .result-success {
            background: #f0fff4;
            border: 1.5px solid #9ae6b4;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .result-success h3 { color: #276749; margin-bottom: 8px; }
        .result-success p  { color: #2f855a; font-size: 0.9rem; }

        .download-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
            margin-top: 14px;
        }

        .download-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 14px 10px;
            background: white;
            border: 1.5px solid #bee3f8;
            border-radius: 10px;
            text-decoration: none;
            color: #2b6cb0;
            font-size: 0.82rem;
            font-weight: 600;
            transition: all 0.15s;
            cursor: pointer;
        }

        .download-btn:hover {
            background: #ebf4ff;
            border-color: #2b6cb0;
            transform: translateY(-2px);
        }

        .download-btn .dl-icon { font-size: 1.8rem; }

        .result-error {
            background: #fff5f5;
            border: 1.5px solid #feb2b2;
            border-radius: 10px;
            padding: 20px;
            color: #c53030;
        }

        .result-error h3 { margin-bottom: 6px; }
        .result-error pre {
            font-size: 0.8rem;
            white-space: pre-wrap;
            word-break: break-word;
            color: #742a2a;
        }
    </style>
</head>
<body>

<header>
    <h1>黑盒子完全教材產出系統</h1>
    <p>上傳教材檔案，自動產出題庫、摘要、簡報與影片</p>
</header>

<main>
    <!-- 檔案上傳 -->
    <div class="card">
        <h2>上傳教材檔案（最多 4 個）</h2>
        <div class="file-grid" id="file-grid">
            <!-- 4 個格子由 JS 動態產生 -->
        </div>
        <p class="supported-types">
            支援格式：PDF &nbsp;·&nbsp; PPT / PPTX &nbsp;·&nbsp; DOC / DOCX &nbsp;·&nbsp; TXT
        </p>
    </div>

    <!-- 參數設定 -->
    <div class="card">
        <h2>產出設定</h2>
        <div class="form-row">
            <div class="form-group">
                <label for="course-name">課程名稱 *</label>
                <input type="text" id="course-name" placeholder="例：職場安全教育訓練" />
            </div>
            <div class="form-group">
                <label for="difficulty">難度</label>
                <select id="difficulty">
                    <option value="easy">簡單</option>
                    <option value="medium" selected>中等</option>
                    <option value="hard">困難</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="language">輸出語言</label>
                <select id="language">
                    <option value="zh-TW" selected>繁體中文</option>
                    <option value="en-US">English</option>
                </select>
            </div>
            <div class="form-group">
                <label for="source-lang">來源語言</label>
                <select id="source-lang">
                    <option value="auto" selected>自動偵測</option>
                    <option value="zh-TW">繁體中文</option>
                    <option value="en-US">English</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>題目類型（可複選）</label>
            <div class="checkbox-group" id="question-types">
                <label class="checkbox-item checked">
                    <input type="checkbox" value="true_false" checked>
                    <span>是非題</span>
                </label>
                <label class="checkbox-item checked">
                    <input type="checkbox" value="single_choice" checked>
                    <span>單選題</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" value="multiple_choice">
                    <span>多選題</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" value="fill_in_blank">
                    <span>填空題</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" value="essay">
                    <span>問答題</span>
                </label>
            </div>
        </div>
    </div>

    <!-- 送出 -->
    <div class="card">
        <button class="submit-btn" id="submit-btn" onclick="submitForm()">
            開始產出教材
        </button>
    </div>

    <!-- 進度 -->
    <div class="card" id="status-area">
        <h2>處理中</h2>
        <div class="progress-bar-wrap">
            <div class="progress-bar" id="progress-bar" style="width: 30%"></div>
        </div>
        <p class="status-msg" id="status-msg">正在分析教材內容，請稍候...</p>
    </div>

    <!-- 結果 -->
    <div class="card" id="result-area">
        <h2>產出結果</h2>
        <div id="result-content"></div>
    </div>
</main>

<script>
    const MAX_FILES = 4;
    const ACCEPT_EXTS = ['pdf', 'ppt', 'pptx', 'doc', 'docx', 'txt'];
    const slots = [];  // { file: File|null, el: HTMLElement }

    // ── 初始化 4 個格子 ──
    function initSlots() {
        const grid = document.getElementById('file-grid');
        grid.innerHTML = '';
        for (let i = 0; i < MAX_FILES; i++) {
            slots[i] = { file: null };
            const zone = document.createElement('div');
            zone.className = 'drop-zone';
            zone.innerHTML = `
                <span class="slot-label">檔案 ${i + 1}</span>
                <button class="remove-btn" onclick="removeFile(${i}, event)">✕</button>
                <div class="hint-default">
                    <div class="icon">📄</div>
                    <div class="hint">點擊選取或拖曳檔案<br>至此區域</div>
                </div>
                <div class="file-info">
                    <div class="icon">✅</div>
                    <div class="file-name" id="fname-${i}"></div>
                    <div class="file-size" id="fsize-${i}"></div>
                </div>
            `;
            // 點擊開啟選檔
            zone.addEventListener('click', (e) => {
                if (e.target.classList.contains('remove-btn')) return;
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = ACCEPT_EXTS.map(e => '.' + e).join(',');
                input.onchange = () => { if (input.files[0]) setFile(i, input.files[0]); };
                input.click();
            });
            // 拖曳
            zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag-over'); });
            zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.classList.remove('drag-over');
                const f = e.dataTransfer.files[0];
                if (f && isAccepted(f.name)) setFile(i, f);
                else alert('不支援的檔案格式，請使用 PDF、PPT/PPTX、DOC/DOCX 或 TXT');
            });
            slots[i].el = zone;
            grid.appendChild(zone);
        }
    }

    function isAccepted(name) {
        const ext = name.split('.').pop().toLowerCase();
        return ACCEPT_EXTS.includes(ext);
    }

    function setFile(idx, file) {
        if (!isAccepted(file.name)) {
            alert('不支援的檔案格式，請使用 PDF、PPT/PPTX、DOC/DOCX 或 TXT');
            return;
        }
        slots[idx].file = file;
        const zone = slots[idx].el;
        zone.classList.add('has-file');
        document.getElementById(`fname-${idx}`).textContent = file.name;
        document.getElementById(`fsize-${idx}`).textContent = formatSize(file.size);
    }

    function removeFile(idx, event) {
        event.stopPropagation();
        slots[idx].file = null;
        slots[idx].el.classList.remove('has-file');
        document.getElementById(`fname-${idx}`).textContent = '';
        document.getElementById(`fsize-${idx}`).textContent = '';
    }

    function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / 1048576).toFixed(1) + ' MB';
    }

    // ── 題型勾選切換 ──
    document.querySelectorAll('.checkbox-item').forEach(item => {
        item.addEventListener('click', () => {
            const cb = item.querySelector('input[type=checkbox]');
            cb.checked = !cb.checked;
            item.classList.toggle('checked', cb.checked);
        });
    });

    // ── 送出 ──
    function submitForm() {
        const courseName = document.getElementById('course-name').value.trim();
        if (!courseName) { alert('請填寫課程名稱'); return; }

        const filesSelected = slots.filter(s => s.file !== null);
        if (filesSelected.length === 0) { alert('請至少上傳一個教材檔案'); return; }

        const questionTypes = Array.from(
            document.querySelectorAll('#question-types input[type=checkbox]:checked')
        ).map(cb => cb.value);
        if (questionTypes.length === 0) { alert('請至少選擇一種題目類型'); return; }

        const formData = new FormData();
        formData.append('course_name', courseName);
        formData.append('difficulty', document.getElementById('difficulty').value);
        formData.append('language', document.getElementById('language').value);
        formData.append('target_language', document.getElementById('language').value);
        formData.append('source_language', document.getElementById('source-lang').value);
        questionTypes.forEach(qt => formData.append('question_types', qt));
        filesSelected.forEach(s => formData.append('materials', s.file));

        // UI 狀態
        document.getElementById('submit-btn').disabled = true;
        document.getElementById('submit-btn').textContent = '產出中...';
        document.getElementById('result-area').style.display = 'none';

        const statusArea = document.getElementById('status-area');
        statusArea.style.display = 'block';
        animateProgress();

        fetch('/api/generate-question-bank', {
            method: 'POST',
            body: formData
        })
        .then(r => r.json())
        .then(data => showResult(data))
        .catch(err => showError(err.toString()))
        .finally(() => {
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').textContent = '開始產出教材';
            statusArea.style.display = 'none';
        });
    }

    let progressTimer = null;
    function animateProgress() {
        let w = 10;
        const bar = document.getElementById('progress-bar');
        const msgs = [
            '正在解析教材內容...',
            '正在標準化文字結構...',
            '正在生成題目...',
            '正在打包輸出檔案...'
        ];
        let msgIdx = 0;
        clearInterval(progressTimer);
        progressTimer = setInterval(() => {
            w = Math.min(w + Math.random() * 8, 90);
            bar.style.width = w + '%';
            document.getElementById('status-msg').textContent = msgs[msgIdx % msgs.length];
            msgIdx++;
        }, 2000);
    }

    function showResult(data) {
        clearInterval(progressTimer);
        document.getElementById('progress-bar').style.width = '100%';
        const area = document.getElementById('result-area');
        const content = document.getElementById('result-content');
        area.style.display = 'block';

        if (data.error) {
            content.innerHTML = `
                <div class="result-error">
                    <h3>產出失敗</h3>
                    <pre>${data.error}</pre>
                </div>`;
            return;
        }

        const files = data.files || {};
        const dlButtons = [
            { key: 'excel_url', icon: '📊', label: '題庫 Excel' },
            { key: 'ppt_url',   icon: '📽️', label: '摘要 PPT' },
            { key: 'txt_url',   icon: '📝', label: '文字摘要' },
            { key: 'cover_url', icon: '🖼️', label: '封面圖片' },
            { key: 'video_url', icon: '🎬', label: '課程影片' },
        ].filter(b => files[b.key])
         .map(b => `
            <a class="download-btn" href="${files[b.key]}" download>
                <span class="dl-icon">${b.icon}</span>
                <span>${b.label}</span>
            </a>`).join('');

        content.innerHTML = `
            <div class="result-success">
                <h3>✅ 產出成功！</h3>
                <p>共生成 <strong>${data.questions_count || 0}</strong> 道題目</p>
                <div class="download-grid">${dlButtons}</div>
            </div>`;
        area.scrollIntoView({ behavior: 'smooth' });
    }

    function showError(msg) {
        clearInterval(progressTimer);
        const area = document.getElementById('result-area');
        area.style.display = 'block';
        document.getElementById('result-content').innerHTML = `
            <div class="result-error">
                <h3>連線失敗</h3>
                <pre>${msg}</pre>
            </div>`;
    }

    // ── 初始化 ──
    initSlots();
</script>
</body>
</html>
